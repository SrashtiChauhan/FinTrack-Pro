<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login to FinTrack Pro</title>
    <link rel="stylesheet" href="css/auth.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Login to FinTrack Pro</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" required />
        </div>
        <div class="form-group">
          <label>Password</label>

          <div class="password-box">
            <input type="password" id="loginPassword" required />

            <span id="togglePassword" class="toggle-password">
              <i class="fa-solid fa-eye"></i>
            </span>
          </div>
        </div>
        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />

            <span>Remember Me</span>
          </label>

          <a href="#" class="forgot-password"> Forgot Password? </a>
        </div>

        <button type="submit" class="login-btn">Login</button>
      </form>
      <p class="switch-page">
        Don't have an account?
        <a href="register.html"> Register here </a>
      </p>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal" id="forgotModal">
      <div class="modal-card">
        <h2>Reset Password</h2>

        <div class="form-group">
          <label>Username</label>
          <input type="text" id="forgotUsername" />
        </div>

        <div class="form-group">
          <label>New Password</label>

          <div class="password-box">
            <input type="password" id="newPassword" />

            <span id="toggleNewPassword" class="toggle-password">
              <i class="fa-solid fa-eye"></i>
            </span>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>

          <div class="password-box">
            <input type="password" id="confirmNewPassword" />

            <span id="toggleConfirmNewPassword" class="toggle-password">
              <i class="fa-solid fa-eye"></i>
            </span>
          </div>
        </div>

        <div class="modal-buttons">
          <button id="cancelReset" class="cancel-btn">Cancel</button>

          <button id="resetPasswordBtn" class="login-btn">
            Reset Password
          </button>
        </div>
      </div>
    </div>

    <div id="toast"></div>
    <script src="js/auth.js"></script>
  </body>
</html>
