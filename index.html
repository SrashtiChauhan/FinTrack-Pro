<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
   <div class="container">
    <aside class="sidebar"> 
        <!-- logo -->
        <div class="logo">
            <i class="fa-solid fa-layer-group"></i>
            <div>
            <h2> FinTrack Pro</h2>
            <p>Enterprise Finance</p>
            </div>
        </div>

        <!-- navigation -->
         <nav> 
            <ul>
                <li class="active">
                    <i class="fa-solid fa-border-all"></i>
                    <span>Dashboard</span>
                </li>
                 <li>
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </li>
            </ul>
            
         </nav>
         <!-- Bottom-btn -->
          <button class="add-btn">
            <i class="fa-solid fa-plus"></i>
            <span>Add Transaction</span>
          </button>

    </aside>
    <main class="main-content">
        <header class="topbar">
        <div class="user-info">
            <span class="username">Srashti</span>
            <button class="logout-btn">Logout</button>
        </div>
        </header>
        <section class="dashboard">
            <h1>Financial Overview</h1>
        <p class="subtitle">
            Real-time tracking application

        </p>
        <div class="cards">
            <div class="card">
                <div class="card-icon blue">
                    <i class="ri-bank-line"></i>
                </div>
                <p class="card-title">Current Balance</p>
                <h2>$0.00</h2>
            </div>
            <div class="card">
                <div class="card-icon green">
                    <i class="ri-arrow-up-line"></i>
                </div>
                <p class="card-title">Total Income</p>
                <h2>$0.00</h2>
            </div>
            <div class="card">
                <div class="card-icon red">
                    <i class="ri-arrow-down-line"></i>
                </div>
                <p class="card-title">Total Expense</p>
                <h2>$0.00</h2>
            </div>
            <div class="card">
                <div class="card-icon purple">
                    <i class="ri-wallet-3-line"></i>
                </div>
                <p class="card-title">Transactions</p>
                <h2>0</h2>
            </div>

        </div>
    </section>
    </main>
   </div>
    <script src="script.js"></script> 
</body>
</html>
