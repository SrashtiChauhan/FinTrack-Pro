<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
    <aside class="sidebar"> 
        <!-- logo -->
        <div class="logo">
            <h2> FinTrack Pro</h2>
            <p>Enterprise Finance</p>
        </div>

        <!-- navigation -->
         <nav> 
            <ul>
                <li class="active">Dashboard</li>
                <li>Settings</li>
            </ul>
            
         </nav>
         <!-- Bottom-btn -->
          <button class="add-btn">
            + Add Transaction
          </button>

    </aside>
    <main class="main-content">
        <header class="topbar">
        <div class="user-info">
            <span class="username">Srashti</span>
            <button class="logout-btn">Logout</button>
        </div>
        </header>
        <section class="dashboard">
            <h1>Financial Overview</h1>
        <p class="subtitle">
            Real-time tracking application

        </p>
        <div class="cards">
            <div class="card">
                <p class="card-title">Current Balance</p>
                <h2>$0.00</h2>
            </div>
            <div class="card">
                <p class="card-title">Total Income</p>
                <h2>$0.00</h2>
            </div>
            <div class="card">
                <p class="card-title">Total Expense</p>
                <h2>$0.00</h2>
            </div>
            <div class="card">
                <p class="card-title">Transactions</p>
                <h2>0</h2>
            </div>

        </div>
    </section>
    </main>
   </div>
    <script src="script.js"></script> 
</body>
</html>
